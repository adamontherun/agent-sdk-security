# Minimal allowlisting egress config for the ECS sidecar. This is the chapter
# 15 pattern reduced to what the sidecar needs: deny by default, allow a named
# set of destination domains, and nothing else. Chapter 15 covers ssl_bump and
# credential injection; for the sidecar the domain allowlist is the load-bearing
# control.

http_port 3128

# The task's own loopback clients (the agent container) are the only allowed
# source. awsvpc containers share localhost, so the agent reaches Squid here.
# Include IPv6 loopback: an agent that dials localhost:3128 often connects over
# ::1, and squid matches the source address, so an IPv4-only ACL silently denies
# every request from that agent.
acl localnet src 127.0.0.1/32 ::1

# Destinations the agent is permitted to reach. A leading dot matches the
# domain and its subdomains. Anything not listed is denied.
acl allowed_domains dstdomain api.anthropic.com
acl allowed_domains dstdomain .githubusercontent.com
acl allowed_domains dstdomain github.com
acl allowed_domains dstdomain registry.npmjs.org

acl SSL_ports port 443
acl CONNECT method CONNECT

# Deny CONNECT to anything but 443, so the tunnel can't be pointed at arbitrary
# ports.
http_access deny CONNECT !SSL_ports

# Allow the allowlisted domains from the local task, deny everything else.
http_access allow localnet allowed_domains
http_access deny all

# Log every request in the native format the chapter 20 triage tool parses.
# Write to the file the ubuntu/squid entrypoint already tails to stdout, so the
# access log still reaches CloudWatch. Logging straight to /dev/stdout makes this
# image's foreground squid exit on startup; the file plus the image's own tail is
# the combination that actually stays up on Fargate.
access_log /var/log/squid/access.log squid
cache deny all
